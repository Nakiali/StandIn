# StandIn Corp — Netlify Configuration

# index.html is the public marketing website (served at /)
# app.html   is the platform web app

[[redirects]]
  from   = "/app"
  to     = "/app.html"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control        = "no-cache"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type  = "application/manifest+json"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/app.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"

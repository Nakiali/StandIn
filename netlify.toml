# ══════════════════════════════════════════════════════════════
#  STANDIN CORP — NETLIFY CONFIGURATION  (netlify.toml)
# ══════════════════════════════════════════════════════════════

[build]
  publish = "."          # Deploy everything in root folder
  command = ""           # No build step needed (pure HTML/JS)

# ── SPA Routing: always serve index.html ─────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security & Cache Headers ──────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"          # Service worker must always be fresh

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StandIn Corp</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC9pJoyiaA6AjQ6yZQRUVYwv2lIfXGiCfo",
  authDomain: "standin-app-dddd1.firebaseapp.com",
  projectId: "standin-app-dddd1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.loadUsers = async () => {
  const snap = await getDoc(doc(db,'config','users'));
  if(snap.exists()) return snap.data().map || {};

  const seed = {
    'nakibongochiali@gmail.com': { pw:'Wanjala@2018', role:'admin', name:'Admin' }
  };
  await window.saveUsers(seed);
  return seed;
};

window.saveUsers = async (obj) => {
  await setDoc(doc(db,'config','users'),{map:obj});
};

window._firebaseReady = true;
document.dispatchEvent(new Event('firebaseReady'));
</script>

<style>
body{margin:0;font-family:Arial}
#auth,#app{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}
input,button{padding:10px;margin:5px;width:250px}
button{background:#0D2B55;color:white;border:none}
</style>
</head>
<body>

<div id="auth">
<h2>StandIn Corp</h2>
<input id="login-email" placeholder="Email"/>
<input id="login-pw" type="password" placeholder="Password"/>
<button onclick="doLogin()">Login</button>

<h3>Register</h3>
<input id="reg-name" placeholder="Name"/>
<input id="reg-email" placeholder="Email"/>
<input id="reg-pw" type="password" placeholder="Password"/>
<button onclick="doRegister()">Create Account</button>
</div>

<div id="app" style="display:none">
<h1 id="welcome"></h1>
<p id="role"></p>
<button onclick="logout()">Logout</button>
</div>

<script>
let CURRENT_USER=null;

async function doRegister(){
  const name=document.getElementById('reg-name').value.trim();
  const email=document.getElementById('reg-email').value.trim().toLowerCase();
  const pw=document.getElementById('reg-pw').value;

  if(!name||!email||!pw) return alert('Fill all fields');

  let users=await loadUsers();
  if(users[email]) return alert('User exists');

  users[email]={name,pw,role:'client'};
  await saveUsers(users);

  alert('Account created');
}

async function doLogin(){
  const email=document.getElementById('login-email').value.trim().toLowerCase();
  const pw=document.getElementById('login-pw').value;

  let users=await loadUsers();

  if(!users[email]||users[email].pw!==pw){
    return alert('Invalid credentials');
  }

  CURRENT_USER=users[email];
  CURRENT_USER.email=email;

  document.getElementById('auth').style.display='none';
  document.getElementById('app').style.display='flex';

  document.getElementById('welcome').innerText='Welcome '+CURRENT_USER.name;
  document.getElementById('role').innerText='Role: '+CURRENT_USER.role;
}

function logout(){
  CURRENT_USER=null;
  document.getElementById('auth').style.display='flex';
  document.getElementById('app').style.display='none';
}
</script>

</body>
</html>
